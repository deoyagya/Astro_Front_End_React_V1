# =============================================================================
# CI Pipeline — React Frontend (Vite)
# Runs on: push to main, PRs targeting main
# Jobs: build verification, docker build verification
# Reusable: adjust Node version, build command, and build args as needed
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # --------------- Build ---------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://placeholder.example.com

      - name: Verify build output
        run: |
          test -f dist/index.html || (echo "Build failed: dist/index.html not found" && exit 1)

  # --------------- Docker Build ---------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=https://placeholder.example.com \
            -t app-test .
